# ─────────────────────────────────────────────────────────────
#  Nginx reverse proxy — forwards all traffic to the
#  WordPress container (service name: wordpress, port 80)
# ─────────────────────────────────────────────────────────────

server {
    listen      80;
    server_name abc.com www.abc.com;

    # ── Logging ──────────────────────────────────────────────
    access_log  /var/log/nginx/wordpress_access.log;
    error_log   /var/log/nginx/wordpress_error.log;

    # ── Max upload size (match your WP media uploads) ────────
    client_max_body_size 64M;

    # ── Proxy all requests to WordPress container ─────────────
    location / {
        proxy_pass         http://wordpress:80;   # service name in compose
        proxy_http_version 1.1;

        # Pass real client info to WordPress
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }

    # ── Block access to sensitive files ──────────────────────
    location ~ /\.env          { deny all; }
    location ~ /\.git          { deny all; }
    location ~ /wp-config\.php { deny all; }

    # ── Security headers ─────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header Referrer-Policy        "no-referrer-when-downgrade" always;
}
